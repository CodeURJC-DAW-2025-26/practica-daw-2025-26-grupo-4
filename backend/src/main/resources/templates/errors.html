<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{status}} - PlantaZon</title>
    <link rel="stylesheet" href="/styles/tokens.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/errors.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        {{>header}}

        <main class="main-content main-content--full">
            <div class="error-container">
                <div class="error-content">
                    <div class="error-icon">
                        {{#is404}}<i class="fas fa-search"></i>{{/is404}}
                        {{#is403}}<i class="fas fa-lock"></i>{{/is403}}
                        {{#is500}}<i class="fas fa-server"></i>{{/is500}}
                        {{^is404}}{{^is403}}{{^is500}}<i class="fas fa-exclamation-circle"></i>{{/is500}}{{/is403}}{{/is404}}
                    </div>

                    <h1 class="error-code">{{status}}</h1>

                    <h2 class="error-message">{{message}}</h2>

                    <p class="error-description">{{detail}}</p>

                    <a href="/" class="btn btn--primary">
                        <i class="fas fa-home"></i> Volver al inicio
                    </a>
                </div>
            </div>
        </main>

        {{>footer}}
    </div>
</body>

</html>
