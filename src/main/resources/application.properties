# Nombre de la app
spring.application.name = daw04

// Puerto del servidor
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.jks
server.ssl.key-store-password=password
server.ssl.key-password=password
server.ssl.key-store-type=JKS
server.ssl.key-alias=selfsigned

# Configuración para que Moustache busque plantillas
spring.mustache.suffix = .html

# Configuración de la conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/plantazon_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Admin1234

# Estrategia de JPA: "update" crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect