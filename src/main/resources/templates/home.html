<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - PlantaZon</title>
    <link rel="stylesheet" href="/styles/tokens.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/home.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        {{>header}}

        <div class="content-row">
            <!-- Sidebar -->
            <div class="sidebar-column">
                <aside class="sidebar">
                    <h3 class="menu-title">Categorías</h3>
                    <nav class="menu">
                {{#categories}}
                <a href="/?categoryId={{id}}" class="menu-item{{#selected}} menu-item--active{{/selected}}" {{#selected}}aria-current="true"{{/selected}}>
                    <i class="{{icon}}"></i> {{name}}
                </a>
                {{/categories}}
                    </nav>
                </aside>
            </div>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Product Section -->
                <div class="content-body">
                    <div class="page-title-row">
                        <h1 class="page-title">{{selectedCategoryName}}</h1>
                        <form class="search-bar search-bar--home" action="/" method="get">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" name="q" placeholder="Buscar productos" value="{{searchQuery}}">
                            <input type="hidden" name="categoryId" value="{{selectedCategoryId}}">
                        </form>
                    </div>
                    <p class="page-subtitle">Nuestra colección de plantas</p>

                    <div class="product-grid">
                    {{#products}}
                    <div class="product-card">
                        <a href="product/{{id}}">
                            <div class="image-container">
                                <img src="{{mainImage}}"
                                    alt="{{name}}">
                            </div>
                            <div class="card-details">
                                <h3>{{name}}</h3>
                                <p class="description">{{description}}</p>
                                <div class="tags">
                                    {{#tags}}
                                    <span class="tag">{{.}}</span>
                                    {{/tags}}
                                </div>
                                <div class="price">€{{formattedPrice}}</div>
                                <div class="card-actions">
                                    <form action="/cart/add" method="post" style="display:contents;">
                                        <input type="hidden" name="productId" value="{{id}}">
                                        <button type="submit" class="btn btn--primary btn--sm btn--grow">
                                            <i class="fa-solid fa-cart-plus"></i> Añadir al carrito
                                        </button>
                                    </form>
                                    <button class="btn btn--ghost btn--sm btn--icon btn--fav">
                                        <i class="fa-regular fa-heart"></i>
                                    </button>
                                </div>
                            </div>
                        </a>
                    </div>
                    {{/products}}

                    {{^products}}
                        <p>No hay productos disponibles.</p>
                    {{/products}}
                    </div>
                </div>
            </main>
        </div>
    </div>

    {{>footer}}
</body>

</html>
