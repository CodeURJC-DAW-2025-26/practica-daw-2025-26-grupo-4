<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recomendaciones - PlantaZon</title>
    <link rel="stylesheet" href="/styles/tokens.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/home.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        {{>header}}

        <div class="content-row">
            <!-- Sidebar -->
            <div class="sidebar-column">
                <aside class="sidebar">
                    <h3 class="menu-title">Categorías</h3>
                    <nav class="menu">
                {{#categories}}
                <a href="/?categoryId={{id}}" class="menu-item">
                    <i class="{{icon}}"></i> {{name}}
                </a>
                {{/categories}}
                <hr class="menu-divider">
                <a href="/recommendations" class="menu-item menu-item--rec menu-item--active" aria-current="true">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Recomendaciones
                </a>
                    </nav>
                </aside>
            </div>

            <!-- Main Content -->
            <main class="main-content">
                <div class="content-body">
                    <div class="page-title-row">
                        <h1 class="page-title">
                            <i class="fa-solid fa-wand-magic-sparkles rec-title-icon"></i>
                            {{recommendationTitle}}
                        </h1>
                    </div>
                    <p class="page-subtitle">{{recommendationSubtitle}}</p>

                    <div class="rec-grid">
                        {{>fragments/recommendations}}
                    </div>

                    {{^recommendations}}
                    <p class="rec-empty">
                        <i class="fa-solid fa-box-open"></i>
                        Aún no tenemos recomendaciones para ti. ¡Realiza tu primera compra!
                    </p>
                    {{/recommendations}}
                </div>
            </main>
        </div>
    </div>

    {{>footer}}
    <script>
        // Add all combo products to cart (cookie manipulation)
        function addComboToCart(comboIds) {
            var ids = comboIds.split(',');
            var cart = getCookieValue('cart') || '';
            for (var i = 0; i < ids.length; i++) {
                cart = addProductToCookieCart(cart, ids[i].trim());
            }
            var expires = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toUTCString();
            document.cookie = 'cart=' + cart + '; path=/; expires=' + expires;
            window.location.reload();
        }

        function getCookieValue(name) {
            var match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
            return match ? decodeURIComponent(match[1]) : '';
        }

        function addProductToCookieCart(cart, productId) {
            if (!cart) return productId + ':1';
            var pairs = cart.split('_');
            for (var i = 0; i < pairs.length; i++) {
                var parts = pairs[i].split(':');
                if (parts[0] === String(productId)) {
                    pairs[i] = parts[0] + ':' + (parseInt(parts[1], 10) + 1);
                    return pairs.join('_');
                }
            }
            return cart + '_' + productId + ':1';
        }
    </script>
</body>

</html>
